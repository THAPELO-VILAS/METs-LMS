{% extends 'academy/base.html' %}

{% block content %}
<div class="container mt-5">
    <h3>{{ assignment.title }}</h3>

    <form method="POST">
        {% csrf_token %}

        {% for q in questions %}
            <div class="mb-4">
                <h5>{{ q.text }}</h5>

                {% for choice in q.assignmentchoice_set.all %}
                    <div>
                        <input type="radio" name="question_{{ q.id }}" value="{{ choice.id }}">
                        {{ choice.text }}
                    </div>
                {% endfor %}
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-success">Submit</button>
    </form>
</div>
{% endblock %}
